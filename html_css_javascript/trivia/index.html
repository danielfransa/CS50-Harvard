<!DOCTYPE html>

<html lang="en">
    <head>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500&display=swap" rel="stylesheet">
        <link href="styles.css" rel="stylesheet">
        <title>Trivia!</title>
        <script>
            document.addEventListener("DOMContentLoaded", function () {
                let correct = document.querySelector(".correct");
                let incorrects = document.querySelectorAll(".incorrect");

                correct.addEventListener("click", function () {
                    correct.style.backgroundColor = "green";
                    document.querySelector("#result1").innerHTML = "Correct!";
                });

                incorrects.forEach(function (button) {
                    button.addEventListener("click", function () {
                        button.style.backgroundColor = "red";
                        document.querySelector("#result1").innerHTML = "Incorrect";
                    });
                });

                document.querySelector("#check").addEventListener("click", function () {

                    let input = document.querySelector("#answer");
                    let answer = input.value.toLowerCase();

                    if (answer === "python") {
                        input.style.backgroundColor = "green";
                        document.querySelector("#result2").innerHTML = "Correct!";
                    } else {
                        input.style.backgroundColor = "red";
                        document.querySelector("#result2").innerHTML = "Incorrect";
                    }
                });
            });

        </script>
    </head>
    <body>
        <div class="header">
            <h1>Trivia!</h1>
        </div>

        <div class="container">
            <div class="section">
                <h2>Part 1: Multiple Choice </h2>
                <hr>

                <h3>What does the abbreviation "WWW" at the beginning of website addresses mean?</h3>

                <button class="incorrect">Western Website World</button>
                <button class="incorrect">Web World Wide</button>
                <button class="correct">World Wide Web</button>
                <button class="incorrect">Wide World Wifi</button>

                <p id="result1"></p>
            </div>

            <div class="section">
                <h2>Part 2: Free Response</h2>
                <hr>

                <h3>Which language is primarily used for Data Science?</h3>

                <input type="text" id="answer">
                <button id="check">Check Answer</button>

                <p id="result2"></p>
            </div>
        </div>
    </body>
</html>
